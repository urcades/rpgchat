<!DOCTYPE html>
<html>
<head>
    <title>Character</title>
    <script>
        // Function to fetch and display user attributes
        function loadUserAttributes() {
            fetch('/user-attributes')
                .then(response => response.json())
                .then(data => {
                    const attributesDiv = document.getElementById('attributes');
                    const effective = data.effectiveStats || data;
                    const base = data.baseStats || data;
                    const bonuses = data.jobBonuses || {};
                    const skill = data.skill || {};
                    attributesDiv.innerHTML = `
                        <p>Job: ${data.job || 'Novice'}</p>
                        <p>Skill: ${skill.label || 'Scrounge'}</p>
                        <p>Level: ${data.level}</p>
                        <p>Attribute Points: ${data.attributePoints || 0}</p>
                        <img src="orb-black.png"/>
                        <p>Gold: ${data.gold !== undefined ? data.gold : 0}</p>
                        <img src="orb-black.png"/>
                        <p>Health: ${effective.health ?? 0}/${effective.maxHealth ?? 0}</p>
                        <p>Stamina: ${effective.stamina ?? 0}/${effective.maxStamina ?? 0}</p>
                        <img src="orb-black.png"/>
                        <p>Speed: ${effective.speed ?? 0}</p>
                        <p>Strength: ${effective.strength ?? 0}</p>
                        <p>Intelligence: ${effective.intelligence ?? 0}</p>
                        <img src="orb-black.png"/>
                        <p>Base: HP ${base.maxHealth ?? 0}, ST ${base.maxStamina ?? 0}, SPD ${base.speed ?? 0}, STR ${base.strength ?? 0}, INT ${base.intelligence ?? 0}</p>
                        <p>Job Bonus: HP +${bonuses.maxHealth || 0}, ST +${bonuses.maxStamina || 0}, SPD +${bonuses.speed || 0}, STR +${bonuses.strength || 0}, INT +${bonuses.intelligence || 0}</p>
                    `;
                });
        }

        // Load user attributes when the page loads
        window.onload = function() {
            loadUserAttributes();
        };

        // Function to handle the "Back to chat" link click
        function goBackToChat() {
            history.back();
        }
    </script>
    <style>
        body {
            background: #ffffff;
            color: #000000;
            font-family: serif;
        }
    </style>
</head>
<body>
    <div class="container">
        <p>Character Information</p>
        <p><a href="#" onclick="goBackToChat(); return false;">Back to chat</a></p>

        <img src="orb-black.png"/>

        <div id="attributes"></div>

        <img src="orb-black.png"/>

        <div class="dropdown">
            <label for="head">Head:</label>
            <select id="head" name="head"></select>
        </div>

        <div class="dropdown">
            <label for="body">Body:</label>
            <select id="body" name="body"></select>
        </div>

        <div class="dropdown">
            <label for="legs">Legs:</label>
            <select id="legs" name="legs"></select>
        </div>

        <div class="dropdown">
            <label for="accessory">Accessory:</label>
            <select id="accessory" name="accessory"></select>
        </div>

        <div class="dropdown">
            <label for="weapon">Weapon:</label>
            <select id="weapon" name="weapon"></select>
        </div>
    </div>
</body>
</html>
