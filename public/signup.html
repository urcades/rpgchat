<!DOCTYPE html>
<html>
<head>
    <title>Sign Up</title>
    <style>
        body {
            background: #ffffff;
            color: #000000;
            font-family: serif;
        }
    </style>
</head>
<body>
    <h2>Sign Up</h2>
    <form method="POST" action="/signup">
        <label for="username">Username:</label>
        <input type="text" id="username" name="username" required><br>
        <label for="password">Password:</label>
        <input type="password" id="password" name="password" required><br>
        <label for="job">Job:</label>
        <select id="job" name="job" required>
            <option value="Novice">Novice</option>
            <option value="Paladin">Paladin</option>
            <option value="Fighter">Fighter</option>
            <option value="Chemist">Chemist</option>
            <option value="Dungeoneer">Dungeoneer</option>
            <option value="Mage">Mage</option>
            <option value="Assassin">Assassin</option>
            <option value="Cleric">Cleric</option>
        </select><br>
        <p>Starting Stats: spend exactly 12 points.</p>
        <label for="health">Health:</label>
        <input type="number" id="health" name="health" min="0" max="12" value="2" required><br>
        <label for="stamina">Stamina:</label>
        <input type="number" id="stamina" name="stamina" min="0" max="12" value="3" required><br>
        <label for="speed">Speed:</label>
        <input type="number" id="speed" name="speed" min="0" max="12" value="2" required><br>
        <label for="strength">Strength:</label>
        <input type="number" id="strength" name="strength" min="0" max="12" value="3" required><br>
        <label for="intelligence">Intelligence:</label>
        <input type="number" id="intelligence" name="intelligence" min="0" max="12" value="2" required><br>
        <p id="stat-total">12 / 12</p>
        <button type="submit">Sign Up</button>
    </form>
    <script>
        const statIds = ['health', 'stamina', 'speed', 'strength', 'intelligence'];
        const pointBudget = 12;

        function getStatInput(id) {
            return document.getElementById(id);
        }

        function getStatValue(id) {
            return Number.parseInt(getStatInput(id).value || '0', 10);
        }

        function getTotal() {
            return statIds.reduce((sum, id) => sum + getStatValue(id), 0);
        }

        function clampChangedStat(changedId) {
            const input = getStatInput(changedId);
            const otherTotal = statIds
                .filter(id => id !== changedId)
                .reduce((sum, id) => sum + getStatValue(id), 0);
            const maxAllowed = Math.max(0, pointBudget - otherTotal);
            const nextValue = Math.min(Math.max(getStatValue(changedId), 0), maxAllowed);
            input.value = nextValue;
        }

        function updateStatLimits() {
            statIds.forEach(id => {
                const input = getStatInput(id);
                const remaining = pointBudget - (getTotal() - getStatValue(id));
                input.max = Math.max(0, remaining);
            });
        }

        function updateStatTotal() {
            const total = getTotal();
            document.getElementById('stat-total').textContent = `${total} / ${pointBudget}`;
            updateStatLimits();
        }

        statIds.forEach(id => {
            document.getElementById(id).addEventListener('input', () => {
                clampChangedStat(id);
                updateStatTotal();
            });
        });
        updateStatTotal();
    </script>
</body>
</html>
