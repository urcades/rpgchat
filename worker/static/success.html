<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>World Map</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main class="page">
    <p>World Map</p>
    <div class="grid-container"></div>
    <nav class="actions">
      <p><a href="/leaderboard">Leaderboard</a></p>
      <p><a href="/cemetery">Graveyard</a></p>
      <p><a href="/character">Status</a></p>
      <p><a href="/logout">Logout</a></p>
    </nav>
  </main>
  <script>
    const gridContainer = document.querySelector('.grid-container');
    const gridItems = new Map();
    for (let row = 1; row <= 16; row += 1) {
      for (let col = 1; col <= 16; col += 1) {
        const gridItem = document.createElement('a');
        gridItem.classList.add('grid-item');
        gridItem.href = `/chat/${row}/${col}`;
        gridItem.textContent = `${row}, ${col}`;
        gridItems.set(`${row}:${col}`, gridItem);
        gridContainer.appendChild(gridItem);
      }
    }
    fetch('/world-events')
      .then(response => response.json())
      .then(events => {
        events.forEach(event => {
          const item = gridItems.get(`${event.row}:${event.col}`);
          if (!item) {
            return;
          }
          item.classList.add('world-event-room');
          item.dataset.eventType = event.eventType;
        });
      })
      .catch(() => {});

    // Adjacency (plan 009): mark where you stand and dim rooms you can't walk to
    // this step. Links stay live — the server is the authority (a dimmed link
    // just returns the "too far" page). Null position = first placement of the
    // day, when everywhere is reachable.
    fetch('/map-state')
      .then(response => response.json())
      .then(({ position }) => {
        if (!position) {
          return;
        }
        const current = gridItems.get(`${position.row}:${position.col}`);
        if (current) {
          current.classList.add('current-room');
        }
        gridItems.forEach((item, key) => {
          const [row, col] = key.split(':').map(Number);
          const distance = Math.max(Math.abs(position.row - row), Math.abs(position.col - col));
          if (distance > 1) {
            item.classList.add('unreachable-room');
          }
        });
      })
      .catch(() => {});
  </script>
</body>
</html>
