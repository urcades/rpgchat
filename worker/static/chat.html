<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Chat</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body class="chat-page">
  <div class="hud global-hud">
    <div class="hud-primary">
      <p><a href="/success">World Map</a></p>
    </div>
    <div id="global-status">
      <p id="tick"></p>
      <p id="phase"></p>
    </div>
  </div>
  <div class="hud top-hud">
    <div class="hud-primary">
      <p><a id="character-link" href="/character">Status</a></p>
      <div id="attributes"></div>
    </div>
    <div id="hud-status">
      <p id="gold"></p>
    </div>
  </div>
  <div class="hud" id="room-ecology-toolbar"></div>
  <div class="hud" id="job-controls" style="display: none;">
    <select id="job-select" name="job">
      <option value="Novice">Novice</option>
      <option value="Paladin">Paladin</option>
      <option value="Fighter">Fighter</option>
      <option value="Chemist">Chemist</option>
      <option value="Dungeoneer">Dungeoneer</option>
      <option value="Mage">Mage</option>
      <option value="Assassin">Assassin</option>
      <option value="Cleric">Cleric</option>
    </select>
    <button type="button" id="job-button">Change Job</button>
  </div>
  <div class="chat">
    <div id="messages"></div>
  </div>
  <div class="hud chat-input-toolbar">
    <div id="target-part-bar" class="action-bar" style="display: none;"></div>
    <div id="stance-bar" class="action-bar"></div>
    <div id="skill-bar" class="action-bar"></div>
    <form class="chat-form" id="chat-form">
      <input type="text" id="message" name="message" aria-label="Message">
      <button type="button" id="clear-target" style="display: none;">Untarget</button>
      <button type="submit" id="send-button">Send</button>
      <button type="button" id="attack-button">Attack</button>
    </form>
  </div>

  <script>
    let socket;
    let phase = 'Day';
    let heartbeatTimer;
    let socketRetryDelay = 1000;
    let realtimeStopped = false; // set on death / auth-expiry / page teardown so the socket stops reconnecting forever
    let roomStateRefreshTimer = null;
    let lastRenderedMessageId = 0; // incremental message rendering high-water mark
    let currentSkill = null;
    let currentSkills = [];
    let currentJob = 'Novice';
    let currentUsername = '';        // set from user-state payloads; used for the optimistic echo
    let currentDisplayName = '';
    let messagesRefreshTimer = null; // debounce for the delta (since-id) message fetch
    let lastEcologyFetchAt = 0;      // throttle for message-event ecology refreshes
    let selectedTarget = '';
    let selectedTargetLabel = ''; // Plan 013e: display name for the hint/echo (selectedTarget stays the key)
    let selectedTargetIsNpc = false; // Plan 024: tracks NPC-ness; the aim bar now keys off aimParts, not this (a bodied NPC CAN be aimed at — plan 024-fix)
    let selectedTargetPart = '';     // Plan 024: '' = no aim (weighted-random hit, the default); else a body-part label
    // Plan 024-fix: the selected target's AIMABLE body-part labels, supplied by the
    // server's presence (aimParts — plan-derived, so a wyrm shows wing/tail, a
    // quadruped four legs, a humanoid/player the humanoid set, a bodyless NPC []).
    // The called-shot bar is built from THIS, not a hardcoded humanoid list.
    let selectedTargetAimParts = [];
    // Plan 024-fix: the latest room presence array (the same data the presence list
    // renders from). A chat-line click only knows a username, so it looks the
    // occupant up here to recover its aimParts.
    let latestPresence = [];
    let incapacitated = false; // Plan 023c: when down, only the chat input stays live

    const pathParts = window.location.pathname.split('/');
    const row = pathParts[2];
    const col = pathParts[3];

    const harmfulStatusLabels = {
      poison: 'poisoned',
      arcane_pin: 'pinned',
      marked: 'marked'
    };

    const helpfulStatusLabels = {
      ward: 'warded',
      bless: 'blessed'
    };

    function getStatusLabel(effectType) {
      return harmfulStatusLabels[effectType] || helpfulStatusLabels[effectType] || effectType;
    }

    function isSkillSystemMessage(message) {
      return /\b(scrounges|wards|power strikes|doses|patches up|surveys|pins|marks|blesses)\b/i.test(message);
    }

    function isSupportSystemMessage(message) {
      return /\b(wards|patches up|blesses)\b/i.test(message);
    }

    function isSpeedContestSystemMessage(message) {
      return /\bdodged\b/i.test(message);
    }

    function isDeathSystemMessage(message) {
      return /\bhas died from\b/i.test(message);
    }

    // Plan 008: a typed message kind maps straight to a CSS class. System rows
    // without a styled kind ('system'/'chat'/undefined, incl. legacy rows written
    // before the kind column) fall back to the prose classifiers above.
    const kindClassMap = {
      skill: 'skill-message',
      support: 'support-message',
      combat: 'speed-message',
      death: 'death-message',
      rite: 'rite-message',
      npc: 'npc-message'
    };

    // legacy fallback for rows written before the kind column
    function applyLegacyMessageClasses(element, message) {
      if (isSkillSystemMessage(message)) {
        element.classList.add('skill-message');
      }
      if (isSupportSystemMessage(message)) {
        element.classList.add('support-message');
      }
      if (isSpeedContestSystemMessage(message)) {
        element.classList.add('speed-message');
      }
      if (isDeathSystemMessage(message)) {
        element.classList.add('death-message');
      }
    }

    function setText(parent, text, className = '') {
      const span = document.createElement('span');
      span.textContent = text;
      if (className) {
        span.className = className;
      }
      parent.appendChild(span);
      return span;
    }

    function appendPlayerMessageText(parent, message) {
      const text = String(message || '');
      // The combat resolver appends its outcome to the player's own line as a trailing
      // "(...)" block — brutal flavor hits ending in "(N)"/"(N)!", dodges, or status
      // notes. Color that block (crimson for a landed blow, purple when it's only a
      // dodge), allowing one level of nested parens for the "(N)" damage tokens. It is
      // anchored to the end of the line and gated on a combat signature, so an ordinary
      // chat parenthetical is left untouched. (The old regex keyed on "attacked … for N
      // damage" wording, which the richer flavor no longer uses.)
      setText(parent, ': ');
      const block = /\((?:[^()]|\([^()]*\))*\)\s*$/.exec(text);
      const isCombatResult = block && /\(\d+\)|\bdodged\b|\bsuffers\b|clean shot/i.test(block[0]);
      if (isCombatResult) {
        if (block.index > 0) {
          setText(parent, text.slice(0, block.index));
        }
        const onlyDodge = /\bdodged\b/i.test(block[0]) && !/\(\d+\)/.test(block[0]);
        setText(parent, block[0], onlyDodge ? 'speed-result' : 'attack-result');
      } else {
        setText(parent, text);
      }
    }

    // Tear down realtime for good: stop the heartbeat poll and close the socket
    // without rescheduling. Called when the session is over (death / auth-expiry)
    // or the page is going away, so onclose doesn't spin up an endless reconnect
    // loop against an endpoint that will only reject a dead/authless session.
    function stopRealtime() {
      realtimeStopped = true;
      clearInterval(heartbeatTimer);
      if (socket && socket.close) {
        socket.close();
      }
    }

    function redirectIfDead(response) {
      if (response.status === 410) {
        stopRealtime();
        response.json()
          .then(data => {
            window.location.href = data.redirect || '/you-died';
          })
          .catch(() => {
            window.location.href = '/you-died';
          });
        return true;
      }
      return false;
    }

    function redirectIfResponseLandedOnDeath(response) {
      if (response.redirected && ['/death', '/you-died'].includes(new URL(response.url).pathname)) {
        stopRealtime();
        window.location.href = new URL(response.url).pathname;
        return true;
      }
      return false;
    }

    function renderMessage(msg) {
      const messageElement = document.createElement('div');
      const isSystem = msg.username === 'System';
      if (isSystem) {
        messageElement.classList.add('system-message');
        const kindClass = kindClassMap[msg.kind];
        if (kindClass) {
          messageElement.classList.add(kindClass);
        } else {
          applyLegacyMessageClasses(messageElement, msg.message);
        }
        messageElement.textContent = `${msg.timestamp} - system: ${msg.message}`;
        return messageElement;
      }

      // Plan 013a: NPC-authored lines (kind 'npc') render by displayName and get the
      // npc styling; targeting still uses the raw username key.
      if (msg.kind === 'npc') {
        messageElement.classList.add('npc-message');
      }
      const activeStatuses = (msg.statusEffects || []).map(getStatusLabel);
      setText(messageElement, `${msg.timestamp} - `);
      const username = document.createElement('button');
      username.type = 'button';
      username.className = 'message-username';
      username.textContent = msg.displayName || msg.username;
      username.addEventListener('click', () => selectTarget(msg.username, msg.displayName || msg.username, msg.kind === 'npc'));
      messageElement.appendChild(username);
      if (msg.job) {
        setText(messageElement, ` [${String(msg.job).toLowerCase()}]`);
      }
      activeStatuses.forEach(status => {
        setText(messageElement, ` [${status}]`);
      });
      appendPlayerMessageText(messageElement, msg.message);
      return messageElement;
    }

    function renderMessages(data) {
      // Incremental append: only messages newer than the last rendered id get new
      // DOM nodes, instead of wiping and rebuilding all ~100 lines per refresh.
      // A fully-fresh list (first render, post-error, or a gap larger than the
      // history window) falls back to the full rebuild.
      const messagesDiv = document.getElementById('messages');
      const list = data || [];
      // A stale/slow fetch that resolves AFTER frames already rendered newer rows
      // must not wipe them: an empty payload against a nonzero watermark is old news.
      if (list.length === 0 && lastRenderedMessageId > 0) {
        return;
      }
      const fresh = list.filter(msg => Number(msg.id) > lastRenderedMessageId);
      if (fresh.length > 0) {
        clearPendingMessages(); // authoritative rows supersede the optimistic echo
      }
      if (messagesDiv.childElementCount === 0 || fresh.length === list.length) {
        messagesDiv.innerHTML = '';
        list.forEach(msg => {
          messagesDiv.appendChild(renderMessage(msg));
        });
      } else {
        fresh.forEach(msg => {
          messagesDiv.appendChild(renderMessage(msg));
        });
        // Keep the DOM bounded to the server's history window.
        while (messagesDiv.childElementCount > list.length) {
          messagesDiv.removeChild(messagesDiv.firstChild);
        }
      }
      if (list.length > 0) {
        lastRenderedMessageId = Math.max(lastRenderedMessageId, Number(list[list.length - 1].id) || 0);
      }
      if (fresh.length > 0 || messagesDiv.childElementCount === 0) {
        scrollToBottom();
      }
    }

    // ---- delta refresh + optimistic echo -----------------------------------

    let pendingMessageNodes = [];

    // ---- actions over the socket -------------------------------------------
    // With a live socket, chat/attack go as WS frames (no HTTP, no per-action
    // auth); each carries a seq and resolves on the matching ack/action-error
    // frame. A dying socket flushes every unresolved action to the HTTP path.
    let wsActionSeq = 0;
    const pendingActions = new Map();
    // Idempotency: each action carries one token shared by its WS frame AND its
    // HTTP fallback, so a replay after a lost ack is applied exactly once
    // server-side. The nonce keeps tokens unique across tabs/reloads.
    const actionNonce = Math.random().toString(36).slice(2, 10);
    let actionTokenCounter = 0;
    function nextActionToken() {
      return `${actionNonce}:${++actionTokenCounter}`;
    }

    function flushPendingActionsToHttp() {
      const pending = Array.from(pendingActions.values());
      pendingActions.clear();
      pending.forEach(action => action.fallback());
    }

    function sendActionOverSocket(frame, handlers) {
      if (!(socket && socket.readyState === 1)) {
        return false;
      }
      const seq = ++wsActionSeq;
      pendingActions.set(seq, handlers);
      try {
        socket.send(JSON.stringify({ ...frame, seq }));
      } catch (error) {
        pendingActions.delete(seq);
        return false;
      }
      return true;
    }
    function clearPendingMessages() {
      pendingMessageNodes.forEach(node => {
        if (typeof node.remove === 'function') {
          node.remove();
        }
      });
      pendingMessageNodes = [];
    }

    // Append-only render for the ?since= delta path: only rows newer than the
    // high-water mark, DOM trimmed to the server's history window.
    function appendMessages(list) {
      const messagesDiv = document.getElementById('messages');
      const fresh = (Array.isArray(list) ? list : []).filter(msg => Number(msg.id) > lastRenderedMessageId);
      if (fresh.length === 0) {
        return;
      }
      clearPendingMessages();
      fresh.forEach(msg => {
        messagesDiv.appendChild(renderMessage(msg));
      });
      while (messagesDiv.childElementCount > 100) {
        messagesDiv.removeChild(messagesDiv.firstChild);
      }
      lastRenderedMessageId = Math.max(lastRenderedMessageId, Number(fresh[fresh.length - 1].id) || 0);
      scrollToBottom();
    }

    function loadNewMessages() {
      fetch(`/messages/${row}/${col}?since=${lastRenderedMessageId}`)
        .then(response => {
          if (redirectIfDead(response)) {
            throw new Error('You died');
          }
          if (!response.ok) {
            throw new Error('Messages unavailable');
          }
          return response.json();
        })
        .then(list => {
          appendMessages(list);
          // A full page means the burst since our cursor exceeded the server's
          // window (the server pages oldest-first) — drain the rest now instead
          // of waiting for the next event.
          if (Array.isArray(list) && list.length >= 100) {
            loadNewMessages();
          }
        })
        .catch(() => {
          // Delta path failed — fall back to the authoritative full refresh.
          scheduleRoomStateRefresh();
        });
    }

    // Chat-only events need just the new lines (a couple of rows), not the ~20-query
    // full room state. Ecology (floor items etc.) can shift via chat commands other
    // players run, so it rides along at most once per 10s.
    function scheduleNewMessagesRefresh() {
      clearTimeout(messagesRefreshTimer);
      messagesRefreshTimer = setTimeout(() => {
        loadNewMessages();
        if (Date.now() - lastEcologyFetchAt > 10000) {
          lastEcologyFetchAt = Date.now();
          loadRoomEcology();
        }
      }, 150);
    }

    // Instant local echo of the player's own line, styled pending until the
    // authoritative row lands (any fresh append clears it). Plain chat echoes
    // as-is; an attack echoes its ATTEMPT ("lunges at X…") and the server's
    // combat lines replace it. Slash commands still don't echo.
    function echoPendingMessage(message) {
      const node = renderMessage({
        username: currentUsername || 'you',
        displayName: currentDisplayName || currentUsername,
        message,
        timestamp: new Date().toISOString().slice(0, 19).replace('T', ' '),
        kind: 'chat',
        job: currentJob,
        statusEffects: []
      });
      node.classList.add('pending-message');
      node.style.opacity = '0.55';
      document.getElementById('messages').appendChild(node);
      pendingMessageNodes.push(node);
      scrollToBottom();
      return node;
    }

    function loadMessages() {
      fetch(`/messages/${row}/${col}`)
        .then(response => {
          if (redirectIfDead(response)) {
            throw new Error('You died');
          }
          if (!response.ok) {
            throw new Error('Messages unavailable');
          }
          return response.json();
        })
        .then(renderMessages)
        .catch(() => {
          document.getElementById('messages').textContent = 'Messages are unavailable in this room right now.';
        });
    }

    function renderUserAttributes(data) {
      const attributesDiv = document.getElementById('attributes');
      const effective = data.effectiveStats || data;
      currentSkill = data.skill || null;
      currentJob = data.job || 'Novice';
      currentUsername = data.username || currentUsername;
      currentDisplayName = data.displayName || data.username || currentDisplayName;
      incapacitated = !!data.incapacitated; // Plan 023b/c
      document.getElementById('character-link').textContent = data.displayName || data.username || 'Status';
      // Plan 013e: while bleeding out, the Health stat itself goes negative — the death
      // clock IS your health now — with an inline note, instead of a layout-breaking banner.
      const healthLine = incapacitated
        ? `<p class="bleeding-out">Health: ${data.deathClock ?? 0}/${effective.maxHealth} — bleeding out, whisper only</p>`
        : `<p>Health: ${effective.health}/${effective.maxHealth}</p>`;
      attributesDiv.innerHTML = `
        <p>${data.job || 'Novice'} ~ Level ${data.level}</p>
        ${healthLine}
        <p>Stamina: ${effective.stamina}/${effective.maxStamina}</p>
        <p>Speed: ${effective.speed}</p>
        <p>Strength: ${effective.strength}</p>
        <p>Intelligence: ${effective.intelligence}</p>
      `;
      document.getElementById('gold').textContent = `Gold: ${data.gold !== undefined ? data.gold : 0}`;
      // Plan 017: render the ability hotbar (data.skills plural after 018; a single
      // data.skill until then) and the stance toggle, replacing the old dropdown.
      renderSkillBar(data.skills || (currentSkill ? [currentSkill] : []));
      renderStanceBar(data.stance || 'standing');
      renderTargetPartBar(); // Plan 024: re-sync the called-shot bar's disabled state
      // Plan 023c: the downed can't fight, skill, or shift stance — only speak.
      const attackButton = document.getElementById('attack-button');
      if (attackButton) {
        attackButton.disabled = incapacitated;
      }
      const jobSelect = document.getElementById('job-select');
      if (jobSelect) {
        Array.from(jobSelect.options).forEach(option => {
          option.selected = option.value === currentJob;
        });
      }
    }

    function loadUserAttributes() {
      fetch('/user-attributes')
        .then(response => {
          if (redirectIfDead(response)) {
            throw new Error('You died');
          }
          return response.json();
        })
        .then(renderUserAttributes);
    }

    function getSkillTooltip(skill) {
      if (!skill) {
        return 'Skill details unavailable.';
      }

      const lines = [`${skill.label}: ${skill.description || 'No description available.'}`];
      (skill.effects || []).forEach(effect => lines.push(`- ${effect}`));
      return lines.join('\n');
    }

    function renderTick(tickValue) {
      phase = tickValue % 100 < 50 ? 'Day' : 'Night';
      document.getElementById('tick').textContent = `Global Tick: ${tickValue}`;
      document.getElementById('phase').textContent = `Phase: ${phase}`;
    }

    function loadTick() {
      fetch('/tick')
        .then(response => {
          if (!response.ok) {
            throw new Error('Tick unavailable');
          }
          return response.json();
        })
        .then(data => {
          renderTick(data.tick);
        })
        .catch(() => {}); // a transient tick miss is harmless — the next poll recovers it
    }

    function setParagraph(parent, text) {
      const paragraph = document.createElement('p');
      paragraph.textContent = text;
      parent.appendChild(paragraph);
      return paragraph;
    }

    function setPresenceParagraph(parent, presence) {
      // Plan 024-fix: cache the presence array so a chat-line click (which only
      // carries a username) can recover that occupant's aimParts by lookup.
      latestPresence = presence || [];
      const paragraph = document.createElement('p');
      paragraph.className = 'room-presence-line';
      setText(paragraph, 'Present: ');
      if (!presence || presence.length === 0) {
        setText(paragraph, 'none');
        parent.appendChild(paragraph);
        return paragraph;
      }

      presence.forEach((player, index) => {
        if (index > 0) {
          setText(paragraph, ', ');
        }
        const button = document.createElement('button');
        button.type = 'button';
        button.className = 'room-presence-target';
        button.textContent = player.displayName || player.username;
        button.addEventListener('click', () => selectTarget(player.username, player.displayName || player.username, Boolean(player.isNpc), player.aimParts));
        paragraph.appendChild(button);
        // Plan 023c: a fallen body is marked prone so the room can see who to help — or finish.
        if (player.incapacitated) {
          const marker = document.createElement('span');
          marker.className = 'prone-marker';
          marker.textContent = ' (prone, bleeding)';
          paragraph.appendChild(marker);
        }
      });
      parent.appendChild(paragraph);
      return paragraph;
    }

    function setGroundParagraph(parent, groundItems) {
      const paragraph = document.createElement('p');
      setText(paragraph, 'Ground: ');
      groundItems.forEach((item, index) => {
        if (index > 0) {
          setText(paragraph, ', ');
        }
        const button = document.createElement('button');
        button.type = 'button';
        button.className = 'room-ground-item';
        button.textContent = item.name;
        button.title = `Take ${item.name}`;
        button.addEventListener('click', () => takeGroundItem(item.name));
        paragraph.appendChild(button);
      });
      parent.appendChild(paragraph);
      return paragraph;
    }

    // Clicking a ground item issues the same /take command a player could type —
    // it routes through the chat endpoint (handleChatAction dispatches /take),
    // costs stamina, advances the tick, and on success updateAll() refreshes the
    // room so the item moves from the floor into the player's inventory.
    function takeGroundItem(itemName) {
      postForm(`/chat/${row}/${col}`, `message=${encodeURIComponent(`/take ${itemName}`)}`);
    }

    function setStockParagraph(parent, stock) {
      const paragraph = document.createElement('p');
      setText(paragraph, 'Stock: ');
      stock.forEach((item, index) => {
        if (index > 0) {
          setText(paragraph, ', ');
        }
        setText(paragraph, `${item.name} ${item.price}g `);
        const button = document.createElement('button');
        button.type = 'button';
        button.className = 'room-buy-item';
        button.textContent = 'buy';
        button.title = `Buy ${item.name} for ${item.price}g`;
        button.addEventListener('click', () => buyStockItem(item.name));
        paragraph.appendChild(button);
      });
      parent.appendChild(paragraph);
      return paragraph;
    }

    // Clicking buy issues the /buy command (handleChatAction dispatches it),
    // spending gold and a tick; on success updateAll() refreshes so the bought
    // item appears in the player's inventory. Errors (not enough gold, sold out
    // for today) surface as an alert via postForm.
    function buyStockItem(itemName) {
      postForm(`/chat/${row}/${col}`, `message=${encodeURIComponent(`/buy ${itemName}`)}`);
    }

    function getRoomDescriptionWithoutLocation(description, rowValue, colValue) {
      return String(description || '').replace(new RegExp(`^Room\\s+${rowValue},\\s*${colValue}\\.\\s*`, 'i'), '');
    }

    function renderRoomEcology(data) {
      const toolbar = document.getElementById('room-ecology-toolbar');
      const featureLabels = data.features.map(feature => feature.active === false ? `${feature.label} (dormant)` : feature.label);
      const traceLabels = data.traceSummary.labels.length > 0 ? data.traceSummary.labels : ['none'];
      const effectLabels = data.effects && data.effects.length > 0
        ? data.effects.map(effect => effect.label || effect.type)
        : ['none'];

      toolbar.innerHTML = '';
      setParagraph(toolbar, `Room: ${data.room.row}, ${data.room.col}`);
      setParagraph(toolbar, `Features: ${featureLabels.join(', ')}`);
      setParagraph(toolbar, `Systems: ${effectLabels.join(', ')}`);
      setParagraph(toolbar, `Traces: ${traceLabels.join(', ')}`);
      if (data.stock && data.stock.length > 0) {
        setStockParagraph(toolbar, data.stock);
      }
      if (data.groundItems && data.groundItems.length > 0) {
        setGroundParagraph(toolbar, data.groundItems);
      }
      if (data.commands && data.commands.length > 0) {
        setParagraph(toolbar, `Commands: ${data.commands.join(', ')}`);
      }
      if (data.innAccess && data.innAccess.required) {
        setParagraph(toolbar, `Inn: ${data.innAccess.paid ? 'paid' : `${data.innAccess.fee}g`}`);
      }
      if (data.activeRound) {
        setParagraph(toolbar, `Dice pool: ${data.activeRound.pool}g, closes in ${data.activeRound.remainingTicks} ticks`);
      }
      if (data.event) {
        setParagraph(toolbar, `Event: ${data.event.title} (${data.event.eventType})`);
      }
      const roomDescription = getRoomDescriptionWithoutLocation(data.description, data.room.row, data.room.col);
      setParagraph(toolbar, `Reset: ${new Date(data.nextResetAt).toUTCString()} ${roomDescription}`);
      setPresenceParagraph(toolbar, data.presence || []);
      const isGuild = data.effects && data.effects.some(effect => effect.type === 'guild');
      document.getElementById('job-controls').style.display = isGuild ? 'flex' : 'none';
    }

    function loadRoomEcology() {
      fetch(`/room-ecology/${row}/${col}`)
        .then(response => {
          if (redirectIfDead(response)) {
            throw new Error('You died');
          }
          return response.json();
        })
        .then(renderRoomEcology);
    }

    function renderRoomState(data) {
      renderRoomEcology(data.room);
      renderMessages(data.messages || []);
      renderUserAttributes(data.user || {});
      renderTick(data.tick || 0);
    }

    function loadRoomState() {
      fetch(`/room-state/${row}/${col}`)
        .then(response => {
          if (redirectIfDead(response)) {
            throw new Error('You died');
          }
          if (!response.ok) {
            throw new Error('Room state unavailable');
          }
          return response.json();
        })
        .then(renderRoomState)
        .catch(() => {
          loadRoomEcology();
          loadMessages();
          loadUserAttributes();
          loadTick();
        });
    }

    function heartbeatRoom() {
      return fetch(`/room-presence/${row}/${col}`, { method: 'POST' }).catch(() => {});
    }

    function updateAll() {
      // With a live socket, broadcasts drive every refresh — the heartbeat only
      // keeps the presence row warm. The full-state refetch is the degraded-mode
      // fallback for a dead/reconnecting socket.
      const socketLive = socket && socket.readyState === 1; // 1 === WebSocket.OPEN
      heartbeatRoom().finally(() => {
        if (!socketLive) {
          loadRoomState();
        }
      });
    }

    function forceRefresh() {
      heartbeatRoom().finally(loadRoomState);
    }

    // Debounce full room-state refetches: a burst of broadcasts (e.g. a multi-hit
    // combat round, or several players acting at once) collapses to one fetch on
    // the trailing edge instead of a thundering-herd refetch per message.
    function scheduleRoomStateRefresh() {
      clearTimeout(roomStateRefreshTimer);
      roomStateRefreshTimer = setTimeout(loadRoomState, 250);
    }

    // The realtime socket, with reconnect. Without this, a Durable Object restart
    // or a slept laptop silently kills live updates and the player limps along on
    // the 15s poll. onclose schedules a reconnect with exponential backoff (1s, 2s,
    // 4s … capped at 30s), reset on a successful open; onerror closes to trigger it.
    function connectSocket() {
      if (realtimeStopped) {
        return; // session is over or the page is unloading — don't reopen
      }
      const socketProtocol = window.location.protocol === 'https:' ? 'wss://' : 'ws://';
      socket = new WebSocket(`${socketProtocol}${window.location.host}/ws/${row}/${col}`);

      socket.onopen = function() {
        socketRetryDelay = 1000;
        loadRoomState(); // resync — events may have been missed while disconnected
      };

      socket.onmessage = function(event) {
        let payload = null;
        try {
          payload = JSON.parse(event.data);
        } catch (error) {
          payload = null;
        }
        // Action frames addressed to this client resolve their pending action.
        if (payload && payload.type === 'ack') {
          const action = pendingActions.get(payload.seq);
          if (action) {
            pendingActions.delete(payload.seq);
            if (action.onSuccess) {
              action.onSuccess();
            }
          }
          return;
        }
        if (payload && payload.type === 'action-error') {
          const action = pendingActions.get(payload.seq);
          if (action) {
            pendingActions.delete(payload.seq);
            if (action.onError) {
              action.onError();
            }
          }
          window.alert(payload.message || 'Action failed');
          return;
        }
        if (payload && payload.type === 'dead') {
          stopRealtime();
          window.location.href = '/you-died';
          return;
        }
        // Presence heartbeats only change who is in the room — and an occupant we
        // already render is a no-op (this is the common case: every occupant
        // heartbeats every 15s, and refetching ecology for each was O(K²) per
        // room). Only an unseen username warrants an ecology refresh. Real game
        // events refetch the whole room state, debounced.
        if (payload && payload.type === 'presence') {
          if (!latestPresence.some(p => p.username === payload.username)) {
            loadRoomEcology();
          }
          return;
        }
        // Self-describing frames: ANY event whose row(s) ride in the broadcast
        // (chat, NPC lines, attacks with their combat lines) appends them
        // immediately — the text never waits on a fetch. Non-message events
        // still fall through below for the debounced room-state refresh, which
        // now only has to carry the STATS (HP bars, ecology), not the lines.
        if (payload && Array.isArray(payload.messages) && payload.messages.length > 0) {
          appendMessages(payload.messages);
          if (payload.type === 'message') {
            return;
          }
        } else if (payload && payload.type === 'message') {
          // A message frame without rows (commands) — fetch just the delta.
          scheduleNewMessagesRefresh();
          return;
        }
        scheduleRoomStateRefresh();
      };

      socket.onclose = function() {
        // Any action still awaiting an ack rides the HTTP fallback.
        flushPendingActionsToHttp();
        if (realtimeStopped) {
          return; // death / auth-expiry / teardown — stay closed, don't reconnect forever
        }
        setTimeout(connectSocket, socketRetryDelay);
        socketRetryDelay = Math.min(socketRetryDelay * 2, 30000);
      };

      socket.onerror = function() {
        socket.close();
      };
    }

    function updateTargetHint() {
      const messageInput = document.getElementById('message');
      const clearTargetButton = document.getElementById('clear-target');
      if (selectedTarget) {
        // Plan 024: surface the aimed limb alongside the target name.
        const aim = selectedTargetPart ? ` — aiming for the ${selectedTargetPart}` : '';
        messageInput.placeholder = `Currently targeting ${selectedTargetLabel || selectedTarget}${aim}`;
      } else {
        messageInput.placeholder = 'Message';
      }
      clearTargetButton.style.display = selectedTarget ? 'inline-block' : 'none';
      clearTargetButton.textContent = 'Untarget';
    }

    function selectTarget(username, label, isNpc = false, aimParts = null) {
      selectedTarget = username;
      selectedTargetLabel = label || username; // Plan 013e: show the name, not the soc:… id
      selectedTargetIsNpc = Boolean(isNpc);
      selectedTargetPart = ''; // Plan 024: a fresh target starts un-aimed
      // Plan 024-fix: record the target's aimable parts (plan-derived, from the
      // server's presence). The presence-list click passes them directly; the
      // chat-line click passes null, so fall back to a by-username lookup in the
      // cached presence (empty if the speaker is no longer present).
      selectedTargetAimParts = Array.isArray(aimParts)
        ? aimParts
        : (latestPresence.find(p => p.username === username)?.aimParts || []);
      updateTargetHint();
      renderTargetPartBar();
      document.getElementById('message').focus();
    }

    function clearTarget() {
      selectedTarget = '';
      selectedTargetLabel = '';
      selectedTargetIsNpc = false;
      selectedTargetPart = '';
      selectedTargetAimParts = []; // Plan 024-fix
      updateTargetHint();
      renderTargetPartBar();
      document.getElementById('message').focus();
    }

    function getMentionTarget(message) {
      const match = message.match(/@([A-Za-z0-9_-]+)/);
      return match ? match[1] : '';
    }

    function getActionMessage(message, attack) {
      const trimmed = message.trim();
      if (!attack) {
        return message;
      }
      // If the player typed an explicit @mention, respect it. Otherwise fall back to the
      // selected target — appended by its DISPLAY NAME (Plan 013e), which the server now
      // resolves, so the echoed line reads "attack Sil" not "@soc:…:barmaid:1".
      if (getMentionTarget(trimmed)) {
        return message;
      }
      if (!selectedTarget) {
        return message;
      }
      const label = selectedTargetLabel || selectedTarget;
      if (trimmed.toLowerCase().includes(label.toLowerCase())) {
        return message;
      }
      return trimmed ? `${trimmed} ${label}` : label;
    }

    function postForm(endpoint, body, onSuccess, onError) {
      fetch(endpoint, {
        method: 'POST',
        headers: {
          Accept: 'application/json',
          'Content-Type': 'application/x-www-form-urlencoded'
        },
        body
      })
        .then(response => {
          if (redirectIfDead(response)) {
            return;
          }
          if (redirectIfResponseLandedOnDeath(response)) {
            return;
          }
          if (!response.ok) {
            return response.text().then(message => {
              throw new Error(message);
            });
          }
          if (onSuccess) {
            onSuccess();
          }
          updateAll();
        })
        .catch(error => {
          if (onError) {
            onError();
          }
          window.alert(error.message);
        });
    }

    function submitMessage(event, attack = false) {
      event.preventDefault();
      const messageInput = document.getElementById('message');
      const message = messageInput.value;
      const actionMessage = getActionMessage(message, attack);
      if (!actionMessage.trim()) {
        return;
      }
      const endpoint = attack ? `/attack/${row}/${col}` : `/chat/${row}/${col}`;
      // Plan 024: the aimed limb rides as structured data, never in the prose, so the
      // chat log stays clean.
      // Plan 024-fix: send it for ANY bodied target — NPC or player. The aim bar only
      // sets selectedTargetPart when the target is bodied (a bodyless target has no
      // bar), and the server accepts a targetPart against any bodied target (a player,
      // or an NPC whose creatureBodyPlan is set), so the old !selectedTargetIsNpc
      // guard — which wrongly stripped aim from every NPC — is gone.
      const actionToken = nextActionToken();
      let body = `message=${encodeURIComponent(actionMessage)}&actionToken=${encodeURIComponent(actionToken)}`;
      if (attack && selectedTargetPart) {
        body += `&targetPart=${encodeURIComponent(selectedTargetPart)}`;
      }
      // Optimistic echo: a plain chat line renders instantly (pending style) and is
      // replaced by the authoritative row when it arrives; rolled back on error.
      // Optimistic echo. A chat line ghosts as-is; an attack ghosts as the
      // ATTEMPT ("Edouard lunges at the Room Lurker…") — the authoritative
      // combat lines (hit, damage, severs) replace it the moment the broadcast
      // lands, so the swing feels instant even though resolution is server-side.
      const pendingNode = attack
        ? echoPendingMessage(selectedTarget
          ? `lunges at ${selectedTargetLabel || selectedTarget}…`
          : `${actionMessage}…`)
        : (!actionMessage.trim().startsWith('/') ? echoPendingMessage(actionMessage) : null);
      const onSuccess = () => {
        messageInput.value = '';
        updateTargetHint();
      };
      const onError = () => {
        if (pendingNode && typeof pendingNode.remove === 'function') {
          pendingNode.remove();
        }
        pendingMessageNodes = pendingMessageNodes.filter(node => node !== pendingNode);
      };
      const sendHttp = () => postForm(endpoint, body, onSuccess, onError);
      // Prefer the socket (no HTTP, no per-action auth); fall back to POST when
      // it isn't live. The input clears optimistically on the WS path — the echo
      // is already rendered, and a failed action restores it for a retry.
      const wsFrame = {
        type: attack ? 'attack' : 'chat',
        message: actionMessage,
        token: actionToken,
        ...(attack && selectedTargetPart ? { targetPart: selectedTargetPart } : {})
      };
      if (sendActionOverSocket(wsFrame, {
        onSuccess,
        onError: () => {
          onError();
          messageInput.value = actionMessage;
        },
        fallback: sendHttp
      })) {
        onSuccess();
        return;
      }
      sendHttp();
    }

    // Plan 017: the ability hotbar — one clickable button per available skill
    // (FFXIV/WoW style). Each button fires its own skill; no dropdown to hunt
    // through. Designed to render N skills so plan 018 is a data change, not a UI one.
    function renderSkillBar(skills) {
      currentSkills = skills || [];
      const bar = document.getElementById('skill-bar');
      bar.innerHTML = '';
      currentSkills.forEach(skill => {
        const button = document.createElement('button');
        button.type = 'button';
        button.className = 'skill-slot';
        button.textContent = skill.label;
        button.title = getSkillTooltip(skill);
        button.disabled = incapacitated; // Plan 023c
        button.addEventListener('click', () => fireSkill(skill.id));
        bar.appendChild(button);
      });
    }

    const STANCE_OPTIONS = ['standing', 'aggressive', 'guarding', 'crouched'];
    function renderStanceBar(currentStance) {
      const bar = document.getElementById('stance-bar');
      bar.innerHTML = '';
      setText(bar, 'Stance: ');
      STANCE_OPTIONS.forEach(name => {
        const button = document.createElement('button');
        button.type = 'button';
        button.className = name === currentStance ? 'stance-slot stance-active' : 'stance-slot';
        button.textContent = name.replace(/^\w/, c => c.toUpperCase());
        button.disabled = incapacitated; // Plan 023c
        button.addEventListener('click', () => setStance(name));
        bar.appendChild(button);
      });
    }

    // Plan 024: the called-shot toolbar — pick the limb the next Attack aims at.
    // The server routes the hit to the named part (parseCalledShot/applyBodyDamage).
    // 'Anywhere' clears the aim back to the default weighted-random hit. The aimed
    // part rides as a separate field on /attack, so it never has to be typed.
    //
    // Plan 024-fix: the per-target buttons are now built from the SELECTED TARGET's
    // aimParts (the server's plan-derived labels), not this list — so a wyrm shows
    // its wings/tail and a quadruped its four legs, not the humanoid set. This stays
    // only as a humanoid FALLBACK for a player whose aimParts is somehow missing.
    const TARGET_PART_OPTIONS = ['head', 'torso', 'neck', 'left arm', 'right arm', 'left leg', 'right leg'];

    // A body-part label -> the button caption ('left wing' -> 'Left wing').
    function targetPartText(label) {
      return label.replace(/^\w/, c => c.toUpperCase());
    }

    // The labels offered for the current target: its server-supplied aimParts when
    // present, else (a player only) the humanoid fallback. A bodyless target has an
    // empty aimParts and no fallback, so the bar stays hidden.
    function currentAimParts() {
      if (Array.isArray(selectedTargetAimParts) && selectedTargetAimParts.length > 0) {
        return selectedTargetAimParts;
      }
      return selectedTargetIsNpc ? [] : TARGET_PART_OPTIONS;
    }

    // Shown whenever the selected target is BODIED — i.e. has a non-empty aimParts —
    // be it an NPC (wyrm/quadruped/brute) or a player. A bodyless target (empty
    // aimParts, e.g. a scalar NPC) keeps the bar hidden, matching the server's gate
    // (a called shot against it is rejected). Mirrors the stance bar's
    // disabled-while-downed behavior so the whole toolbar stack reads consistently.
    function renderTargetPartBar() {
      const bar = document.getElementById('target-part-bar');
      if (!bar) {
        return;
      }
      const parts = currentAimParts();
      const show = Boolean(selectedTarget) && parts.length > 0;
      bar.style.display = show ? 'flex' : 'none';
      bar.innerHTML = '';
      if (!show) {
        return;
      }
      setText(bar, 'Aim: ');
      const options = [{ label: '', text: 'Anywhere' }, ...parts.map(label => ({ label, text: targetPartText(label) }))];
      options.forEach(part => {
        const button = document.createElement('button');
        button.type = 'button';
        button.className = part.label === selectedTargetPart ? 'part-slot part-active' : 'part-slot';
        button.textContent = part.text;
        button.disabled = incapacitated; // Plan 023c: the downed can't aim a strike
        button.addEventListener('click', () => selectTargetPart(part.label));
        bar.appendChild(button);
      });
    }

    function selectTargetPart(label) {
      // Re-clicking the active limb toggles the aim back off (to 'Anywhere').
      selectedTargetPart = selectedTargetPart === label ? '' : label;
      renderTargetPartBar();
      updateTargetHint();
      document.getElementById('message').focus();
    }

    function fireSkill(skillId) {
      if (!skillId) {
        return;
      }
      const messageInput = document.getElementById('message');
      const targetUsername = getMentionTarget(messageInput.value) || selectedTarget;
      postForm(
        `/skill/${row}/${col}`,
        `skillId=${encodeURIComponent(skillId)}&targetUsername=${encodeURIComponent(targetUsername)}`,
        updateTargetHint
      );
    }

    // The active stance is set via the existing /stance command (owner principle:
    // verbs stay chat-command-backed); the button just issues it.
    function setStance(name) {
      postForm(`/chat/${row}/${col}`, `message=${encodeURIComponent('/stance ' + name)}`);
    }

    // The keyboard shortcut fires the first ability on the bar.
    function submitSkill(event) {
      if (event && event.preventDefault) {
        event.preventDefault();
      }
      const first = currentSkills[0];
      if (first) {
        fireSkill(first.id);
      }
    }

    function submitJobChange(event) {
      event.preventDefault();
      const job = document.getElementById('job-select').value;
      postForm(`/job/${row}/${col}`, `job=${encodeURIComponent(job)}`);
    }

    function scrollToBottom() {
      const messagesDiv = document.getElementById('messages');
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    document.addEventListener('DOMContentLoaded', function() {
      document.getElementById('chat-form').addEventListener('submit', event => submitMessage(event, false));
      document.getElementById('attack-button').addEventListener('click', event => submitMessage(event, true));
      document.getElementById('job-button').addEventListener('click', submitJobChange);
      document.getElementById('clear-target').addEventListener('click', clearTarget);
      document.getElementById('message').addEventListener('keydown', function(event) {
        if (event.shiftKey && event.metaKey && event.key === 'Enter') {
          submitSkill(event);
        } else if ((event.altKey || event.metaKey) && event.key === 'Enter') {
          submitMessage(event, true);
        }
      });
      document.addEventListener('keydown', function(event) {
        if (event.key === 'Escape' && selectedTarget) {
          clearTarget();
        }
      });

      updateTargetHint();
      updateAll();
      // Presence TTL still depends on this 15s heartbeat; the socket is additive.
      heartbeatTimer = setInterval(updateAll, 15000);

      // Returning to a backgrounded tab resyncs immediately instead of waiting
      // for the next heartbeat.
      document.addEventListener('visibilitychange', function() {
        if (!document.hidden) {
          // Full resync on return: a slept laptop can hold a socket that still
          // reports OPEN, so don't trust it here.
          forceRefresh();
        }
      });

      // Leaving the page (navigation, tab close, bfcache): stop the heartbeat and
      // close the socket so we don't leak a timer or a reconnect loop on teardown.
      if (window.addEventListener) {
        window.addEventListener('pagehide', stopRealtime);
      }

      connectSocket();
    });
  </script>
</body>
</html>
