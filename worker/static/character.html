<!DOCTYPE html>
<html>
<head>
  <title>Character</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main class="page">
    <p>Character Information</p>
    <p><a href="#" onclick="history.back(); return false;">Back to chat</a></p>
    <div id="attributes" class="character-sheet"></div>
  </main>
  <script>
    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>"']/g, character => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
      }[character]));
    }

    function signed(value) {
      const number = Number(value || 0);
      return `${number >= 0 ? '+' : ''}${number}`;
    }

    function renderRows(rows) {
      return `
        <dl class="character-list">
          ${rows.map(([label, value]) => `
            <div class="character-row">
              <dt>${escapeHtml(label)}</dt>
              <dd>${escapeHtml(value)}</dd>
            </div>
          `).join('')}
        </dl>
      `;
    }

    function renderSimpleList(items, emptyText) {
      if (!items.length) {
        return `<p>${escapeHtml(emptyText)}</p>`;
      }
      return `<ul>${items.map(item => `<li>${item}</li>`).join('')}</ul>`;
    }

    fetch('/user-attributes')
      .then(response => response.json())
      .then(data => {
        const effective = data.effectiveStats || data;
        const base = data.baseStats || data;
        const bonuses = data.jobBonuses || {};
        const skill = data.skill || {};
        const achievements = data.achievements || [];
        const kills = data.kills || [];
        const overviewRows = [
          ['Job', data.job || 'Novice'],
          ['Skill', skill.label || 'Scrounge'],
          ['Level', data.level ?? 0],
          ['Experience', data.experience || 0],
          ['Attribute Points', data.attributePoints || 0],
          ['Gold', data.gold !== undefined ? data.gold : 0]
        ];
        const currentRows = [
          ['Health', `${effective.health ?? 0}/${effective.maxHealth ?? 0}`],
          ['Stamina', `${effective.stamina ?? 0}/${effective.maxStamina ?? 0}`],
          ['Speed', effective.speed ?? 0],
          ['Strength', effective.strength ?? 0],
          ['Intelligence', effective.intelligence ?? 0]
        ];
        const baseItems = [
          `HP ${escapeHtml(base.maxHealth ?? 0)}`,
          `ST ${escapeHtml(base.maxStamina ?? 0)}`,
          `SPD ${escapeHtml(base.speed ?? 0)}`,
          `STR ${escapeHtml(base.strength ?? 0)}`,
          `INT ${escapeHtml(base.intelligence ?? 0)}`
        ];
        const bonusItems = [
          `HP ${escapeHtml(signed(bonuses.maxHealth))}`,
          `ST ${escapeHtml(signed(bonuses.maxStamina))}`,
          `SPD ${escapeHtml(signed(bonuses.speed))}`,
          `STR ${escapeHtml(signed(bonuses.strength))}`,
          `INT ${escapeHtml(signed(bonuses.intelligence))}`
        ];
        const body = data.body || [];
        const bodyRows = body.map(part => [part.label, part.condition]);
        const equipment = data.equipment || {};
        const equipmentRows = Object.keys(equipment).map(label => [label, equipment[label] || 'empty']);
        const inventory = data.inventory || [];
        const inventoryItems = inventory.map(item => {
          const mods = item.modifiers || {};
          const modParts = ['speed', 'strength', 'intelligence', 'maxStamina']
            .filter(key => Number(mods[key] || 0) !== 0)
            .map(key => `${({ speed: 'SPD', strength: 'STR', intelligence: 'INT', maxStamina: 'ST' })[key]} ${signed(mods[key])}`);
          const modText = modParts.length ? ` ${modParts.join(' ')}` : '';
          return `${escapeHtml(item.name)} [${escapeHtml(item.slotType)}]${escapeHtml(modText)}`;
        });
        const gear = data.gearBonuses || {};
        const gearItems = [
          `ST ${escapeHtml(signed(gear.maxStamina))}`,
          `SPD ${escapeHtml(signed(gear.speed))}`,
          `STR ${escapeHtml(signed(gear.strength))}`,
          `INT ${escapeHtml(signed(gear.intelligence))}`
        ];
        const achievementItems = achievements.map(achievement => escapeHtml(achievement.achievementType));
        const killItems = kills.map(kill => {
          const name = escapeHtml(kill.defeatedName || kill.defeatedUsername || 'Unknown');
          const kind = escapeHtml(kill.defeatedKind || 'entity');
          const level = escapeHtml(kill.defeatedLevel ?? 0);
          const xp = escapeHtml(kill.experienceGained ?? 0);
          return `${name} (${kind}) - Level ${level}, ${xp} XP gained`;
        });
        const skillEffects = (skill.effects || []).map(effect => escapeHtml(effect));
        document.getElementById('attributes').innerHTML = `
          <section class="character-section">
            <h2>Overview</h2>
            ${renderRows(overviewRows)}
          </section>
          <section class="character-section">
            <h2>Skill</h2>
            <p><strong>${escapeHtml(skill.label || 'Scrounge')}:</strong> ${escapeHtml(skill.description || 'No description available.')}</p>
            ${renderSimpleList(skillEffects, 'No skill effects listed.')}
          </section>
          <section class="character-section">
            <h2>Current Stats</h2>
            ${renderRows(currentRows)}
          </section>
          <section class="character-section">
            <h2>Body</h2>
            ${bodyRows.length ? renderRows(bodyRows) : `<p>${escapeHtml('No body information available.')}</p>`}
          </section>
          <section class="character-section">
            <h2>Equipment</h2>
            ${equipmentRows.length ? renderRows(equipmentRows) : `<p>${escapeHtml('No equipment slots available.')}</p>`}
          </section>
          <section class="character-section">
            <h2>Inventory</h2>
            ${renderSimpleList(inventoryItems, 'Nothing carried.')}
          </section>
          <section class="character-section">
            <h2>Gear Bonus</h2>
            ${renderSimpleList(gearItems, 'No gear bonuses.')}
          </section>
          <section class="character-section">
            <h2>Base Stats</h2>
            ${renderSimpleList(baseItems, 'No base stats available.')}
          </section>
          <section class="character-section">
            <h2>Job Bonus</h2>
            ${renderSimpleList(bonusItems, 'No job bonuses available.')}
          </section>
          <section class="character-section">
            <h2>Achievements</h2>
            ${renderSimpleList(achievementItems, 'No achievements yet.')}
          </section>
          <section class="character-section">
            <h2>Kills</h2>
            ${renderSimpleList(killItems, 'No kills recorded yet.')}
          </section>
        `;
      });
  </script>
</body>
</html>
