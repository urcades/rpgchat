<!DOCTYPE html>
<html>
<head>
  <title>Character</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main class="page">
    <p>Character Information</p>
    <p><a href="#" onclick="history.back(); return false;">Back to chat</a> · <a href="/grid">Progression Grid</a></p>
    <div id="attributes" class="character-sheet"></div>
  </main>
  <script>
    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>"']/g, character => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
      }[character]));
    }

    function signed(value) {
      const number = Number(value || 0);
      return `${number >= 0 ? '+' : ''}${number}`;
    }

    // A gear delta annotation, e.g. " (+1 gear)". Empty when zero so unmodified
    // stats stay clean.
    function modSpan(value, label = 'gear') {
      const number = Number(value || 0);
      return number !== 0 ? ` <span class="stat-mod">(${signed(number)} ${escapeHtml(label)})</span>` : '';
    }

    function row(label, valueHtml) {
      return `<div class="character-row"><dt>${escapeHtml(label)}</dt><dd>${valueHtml}</dd></div>`;
    }

    function rowList(rows) {
      return `<dl class="character-list">${rows.join('')}</dl>`;
    }

    function renderRows(rows) {
      return rowList(rows.map(([label, value]) => row(label, escapeHtml(value))));
    }

    function renderSimpleList(items, emptyText) {
      if (!items.length) {
        return `<p>${escapeHtml(emptyText)}</p>`;
      }
      return `<ul>${items.map(item => `<li>${item}</li>`).join('')}</ul>`;
    }

    function itemModText(modifiers) {
      const mods = modifiers || {};
      const labels = { speed: 'SPD', strength: 'STR', intelligence: 'INT', maxStamina: 'ST', maxHealth: 'HP' };
      const parts = ['maxHealth', 'speed', 'strength', 'intelligence', 'maxStamina']
        .filter(key => Number(mods[key] || 0) !== 0)
        .map(key => `${labels[key]} ${signed(mods[key])}`);
      return parts.length ? ` ${parts.join(' ')}` : '';
    }

    // A small inline action button. Disabled (with a tooltip) when the player is
    // not currently in a room, since /equip, /unequip and /drop run through the
    // room command system.
    function actionButton(action, ref, text, enabled) {
      const disabled = enabled ? '' : ' disabled title="Enter a room to manage gear"';
      return `<button type="button" class="gear-action" data-action="${escapeHtml(action)}" data-ref="${escapeHtml(ref)}"${disabled}>${escapeHtml(text)}</button>`;
    }

    let currentRoom = null;

    function performGearAction(action, ref) {
      if (!currentRoom) {
        window.alert('Enter a room first — equipping, unequipping and dropping happen where you are standing.');
        return;
      }
      if (action === 'drop' && !window.confirm(`Drop ${ref} here? Anyone in the room can pick it up.`)) {
        return;
      }
      fetch(`/chat/${currentRoom.row}/${currentRoom.col}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded', Accept: 'application/json' },
        body: `message=${encodeURIComponent(`/${action} ${ref}`)}`
      })
        .then(response => {
          if (!response.ok) {
            return response.text().then(message => { throw new Error(message || 'That action failed.'); });
          }
          load();
        })
        .catch(error => window.alert(error.message));
    }

    function render(data) {
      currentRoom = data.currentRoom || null;
      const effective = data.effectiveStats || data;
      const base = data.baseStats || data;
      const bonuses = data.jobBonuses || {};
      const gear = data.gearBonuses || {};
      const gearHealth = Number(data.gearHealthBonus || 0);
      const skill = data.skill || {};
      const canAct = Boolean(currentRoom);

      const overviewRows = [
        ['Job', data.job || 'Novice'],
        ['Skill', skill.label || 'Scrounge'],
        ['Level', data.level ?? 0],
        ['Experience', data.experience || 0],
        ['Attribute Points', data.attributePoints || 0],
        ['Gold', data.gold !== undefined ? data.gold : 0]
      ];

      // Plan 016: unspent attribute points get a "+" beside each allocatable stat.
      // maxHealth is body-bound (Σ part maxHp) and intentionally not allocatable yet.
      const points = Number(data.attributePoints || 0);
      function allocBtn(statKey) {
        return points > 0
          ? ` <button type="button" class="gear-action" data-allocate="${statKey}" title="Spend 1 point">+</button>`
          : '';
      }

      // Current stats annotated with the gear contribution per stat. Health shows
      // armor HP (structural, plan 015 — not in the effective gear-modifier layer);
      // the rest come from gearBonuses.
      const currentStats = rowList([
        row('Health', `${escapeHtml(effective.health ?? 0)}/${escapeHtml(effective.maxHealth ?? 0)}${modSpan(gearHealth, 'armor')}`),
        row('Stamina', `${escapeHtml(effective.stamina ?? 0)}/${escapeHtml(effective.maxStamina ?? 0)}${modSpan(gear.maxStamina)}${allocBtn('maxStamina')}`),
        row('Speed', `${escapeHtml(effective.speed ?? 0)}${modSpan(gear.speed)}${allocBtn('speed')}`),
        row('Strength', `${escapeHtml(effective.strength ?? 0)}${modSpan(gear.strength)}${allocBtn('strength')}`),
        row('Intelligence', `${escapeHtml(effective.intelligence ?? 0)}${modSpan(gear.intelligence)}${allocBtn('intelligence')}`)
      ]);
      const pointsHint = points > 0
        ? `<p class="gear-hint">You have ${points} attribute point${points === 1 ? '' : 's'} to spend — tap a + beside a stat.</p>`
        : '';

      const body = data.body || [];
      const bodyRows = body.map(part => [part.label, part.condition]);

      // Equipment keyed by part label. Occupied parts get an (unequip) button —
      // unequip by part label so it's unambiguous when two items share a name.
      const equipment = data.equipment || {};
      const equipmentRows = Object.keys(equipment).map(label => {
        const itemName = equipment[label];
        if (!itemName) {
          return row(label, 'empty');
        }
        return row(label, `${escapeHtml(itemName)} ${actionButton('unequip', label, 'unequip', canAct)}`);
      });

      // Carried inventory. Consumables (020a) get use; gear gets equip; materia (020d)
      // are socketed via the /socket command. All get drop.
      const inventory = data.inventory || [];
      const inventoryHtml = inventory.length
        ? `<ul class="inventory-list">${inventory.map(item => {
            const isConsumable = item.category === 'consumable';
            const isMateria = item.category === 'materia';
            const qty = Number(item.quantity || 1) > 1 ? ` ×${escapeHtml(item.quantity)}` : '';
            const kind = isConsumable ? 'consumable' : (isMateria ? 'materia' : item.slotType);
            const socketTag = Number(item.sockets || 0) > 0 ? ` (${escapeHtml(item.sockets)} sockets)` : '';
            const meta = `${escapeHtml(item.name)}${qty} [${escapeHtml(kind)}]${socketTag}${escapeHtml(itemModText(item.modifiers))}`;
            const primary = isConsumable
              ? actionButton('use', item.name, 'use', canAct)
              : (isMateria ? '' : actionButton('equip', item.name, 'equip', canAct));
            const actions = `${primary}${actionButton('drop', item.name, 'drop', canAct)}`;
            return `<li>${meta} ${actions}</li>`;
          }).join('')}</ul>`
        : '<p>Nothing carried.</p>';

      // Plan 020d: read-only socket summary for equipped gear with sockets.
      const socketRows = (data.socketSummary || []).map(s => {
        const filled = (s.materia || []).map(m => escapeHtml(m)).join(', ');
        const free = Math.max(0, Number(s.sockets || 0) - (s.materia || []).length);
        const slots = filled ? `${filled}${free > 0 ? `, +${free} empty` : ''}` : `${free} empty`;
        return [s.host, slots];
      });

      const baseItems = [
        `HP ${escapeHtml(base.maxHealth ?? 0)}`,
        `ST ${escapeHtml(base.maxStamina ?? 0)}`,
        `SPD ${escapeHtml(base.speed ?? 0)}`,
        `STR ${escapeHtml(base.strength ?? 0)}`,
        `INT ${escapeHtml(base.intelligence ?? 0)}`
      ];
      const bonusItems = [
        `HP ${escapeHtml(signed(bonuses.maxHealth))}`,
        `ST ${escapeHtml(signed(bonuses.maxStamina))}`,
        `SPD ${escapeHtml(signed(bonuses.speed))}`,
        `STR ${escapeHtml(signed(bonuses.strength))}`,
        `INT ${escapeHtml(signed(bonuses.intelligence))}`
      ];
      const achievementItems = (data.achievements || []).map(achievement => escapeHtml(achievement.achievementType));
      const killItems = (data.kills || []).map(kill => {
        const name = escapeHtml(kill.defeatedName || kill.defeatedUsername || 'Unknown');
        const kind = escapeHtml(kill.defeatedKind || 'entity');
        const level = escapeHtml(kill.defeatedLevel ?? 0);
        const xp = escapeHtml(kill.experienceGained ?? 0);
        return `${name} (${kind}) - Level ${level}, ${xp} XP gained`;
      });
      // Plan 018: render the full active kit and the read-only passives. Falls back
      // to the single `skill` for older payloads.
      const activeSkills = (data.skills && data.skills.length) ? data.skills : (skill.label ? [skill] : []);
      const passives = data.passives || [];
      const abilityBlock = ability =>
        `<p><strong>${escapeHtml(ability.label || 'Ability')}:</strong> ${escapeHtml(ability.description || 'No description available.')}</p>`
        + renderSimpleList((ability.effects || []).map(effect => escapeHtml(effect)), 'No effects listed.');
      const skillsHtml = activeSkills.length ? activeSkills.map(abilityBlock).join('') : '<p>No active skills.</p>';
      const passivesHtml = passives.length ? passives.map(abilityBlock).join('') : '<p>No passive abilities.</p>';

      const roomHint = canAct
        ? ''
        : `<p class="gear-hint">You aren't in a room right now. Enter a room from the World Map to equip, unequip, or drop items.</p>`;

      document.getElementById('attributes').innerHTML = `
        <section class="character-section">
          <h2>Overview</h2>
          ${renderRows(overviewRows)}
        </section>
        <section class="character-section">
          <h2>Skill</h2>
          ${skillsHtml}
        </section>
        <section class="character-section">
          <h2>Passives</h2>
          ${passivesHtml}
        </section>
        <section class="character-section">
          <h2>Current Stats</h2>
          ${pointsHint}
          ${currentStats}
        </section>
        <section class="character-section">
          <h2>Body</h2>
          <p>${escapeHtml('Stance: ' + (data.stance || 'standing').replace(/^\w/, c => c.toUpperCase()))}</p>
          ${bodyRows.length ? renderRows(bodyRows) : `<p>${escapeHtml('No body information available.')}</p>`}
        </section>
        <section class="character-section">
          <h2>Equipment</h2>
          ${roomHint}
          ${equipmentRows.length ? rowList(equipmentRows) : `<p>${escapeHtml('No equipment slots available.')}</p>`}
        </section>
        <section class="character-section">
          <h2>Inventory</h2>
          ${roomHint}
          ${inventoryHtml}
        </section>
        <section class="character-section">
          <h2>Sockets</h2>
          ${socketRows.length ? renderRows(socketRows) : `<p>${escapeHtml('No socketed gear. Equip gear with sockets, then /socket <materia> into <item>.')}</p>`}
        </section>
        <section class="character-section">
          <h2>Base Stats</h2>
          ${renderSimpleList(baseItems, 'No base stats available.')}
        </section>
        <section class="character-section">
          <h2>Job Bonus</h2>
          ${renderSimpleList(bonusItems, 'No job bonuses available.')}
        </section>
        <section class="character-section">
          <h2>Achievements</h2>
          ${renderSimpleList(achievementItems, 'No achievements yet.')}
        </section>
        <section class="character-section">
          <h2>Kills</h2>
          ${renderSimpleList(killItems, 'No kills recorded yet.')}
        </section>
      `;
    }

    function load() {
      fetch('/user-attributes')
        .then(response => response.json())
        .then(render)
        .catch(() => {
          document.getElementById('attributes').textContent = 'Character data is unavailable right now.';
        });
    }

    // Plan 016: spend a point on a stat. The endpoint returns the fresh state, so
    // we re-render from the response in one round trip.
    function performAllocate(stat) {
      fetch('/allocate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded', Accept: 'application/json' },
        body: `stat=${encodeURIComponent(stat)}`
      })
        .then(response => {
          if (!response.ok) {
            return response.text().then(message => { throw new Error(message || 'Could not allocate that point.'); });
          }
          return response.json();
        })
        .then(render)
        .catch(error => window.alert(error.message));
    }

    // Delegated once on the persistent container; innerHTML re-renders don't lose it.
    document.getElementById('attributes').addEventListener('click', event => {
      const gearButton = event.target.closest('button[data-action]');
      if (gearButton && !gearButton.disabled) {
        performGearAction(gearButton.dataset.action, gearButton.dataset.ref);
        return;
      }
      const allocButton = event.target.closest('button[data-allocate]');
      if (allocButton) {
        performAllocate(allocButton.dataset.allocate);
      }
    });

    load();
  </script>
</body>
</html>
