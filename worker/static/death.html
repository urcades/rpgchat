<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>You Died</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main class="page">
    <p id="grave-name">You died.</p>
    <div id="grave">
      <p>Job: <span id="grave-job">...</span></p>
      <p>Level reached: <span id="grave-level">...</span></p>
      <p>Gold accumulated: <span id="grave-gold">...</span></p>
      <p>Final room: <span id="grave-room">...</span></p>
      <p>Cause: <span id="grave-cause">...</span></p>
      <p>Died at: <span id="grave-died-at">...</span></p>
      <p>Kills: <span id="grave-kills">...</span></p>
      <p>Achievements: <span id="grave-achievements">...</span></p>
    </div>
    <div class="actions">
      <a href="/logout">Return home</a>
      <a href="/signup">Create new player</a>
      <button id="resurrect-button" class="link-button" type="button">Pay to resurrect</button>
    </div>
  </main>
  <script>
    const deathFlavorRules = [
      {
        match: (grave, cause) => cause === `attack by ${grave.username}`,
        text: grave => `${grave.username} killed themself.`
      },
      {
        match: (grave, cause) => cause.startsWith('bled out after attack by '),
        text: (grave, cause) => `${grave.username} was cut down by ${cause.replace('bled out after attack by ', '')} and bled out where they lay.`
      },
      {
        match: (grave, cause) => cause.startsWith('bled out after '),
        text: (grave, cause) => `${grave.username} succumbed to ${cause.replace('bled out after ', '')} and bled out.`
      },
      {
        match: (grave, cause) => cause === 'bled out',
        text: grave => `${grave.username} bled out, alone and unaided.`
      },
      {
        match: (grave, cause) => cause.startsWith('attack by '),
        text: (grave, cause) => `${grave.username} was killed by ${cause.replace('attack by ', '')}.`
      },
      {
        match: (grave, cause) => cause.startsWith('power strike by '),
        text: (grave, cause) => `${grave.username} was felled by ${cause.replace('power strike by ', '')}'s Power Strike.`
      },
      {
        match: (grave, cause) => cause.startsWith('dose by '),
        text: (grave, cause) => `${grave.username} died from ${cause.replace('dose by ', '')}'s poisoned dose.`
      },
      {
        match: (grave, cause) => cause === 'poison marsh',
        text: grave => `${grave.username} was claimed by the poison marsh.`
      },
      {
        match: (grave, cause) => cause.includes('trap'),
        text: grave => `${grave.username} died to a trap.`
      }
    ];

    function setText(id, text) {
      document.getElementById(id).textContent = text;
    }

    function formatRoom(grave) {
      if (grave.roomRow === null || grave.roomRow === undefined || grave.roomCol === null || grave.roomCol === undefined) {
        return 'Unknown';
      }
      return `${grave.roomRow}, ${grave.roomCol}`;
    }

    function formatDeathHeadline(grave) {
      const cause = String(grave.cause || '').trim().toLowerCase();
      const rule = deathFlavorRules.find(candidate => candidate.match(grave, cause));
      return rule ? rule.text(grave, cause) : `${grave.username} died.`;
    }

    document.getElementById('resurrect-button').addEventListener('click', () => {
      const button = document.getElementById('resurrect-button');
      button.disabled = true;
      button.textContent = 'Opening payment...';

      fetch('/resurrection-link', { method: 'POST' })
        .then(response => {
          if (!response.ok) {
            throw new Error('Resurrection is not available for this character.');
          }
          return response.json();
        })
        .then(data => {
          window.location.href = data.url;
        })
        .catch(error => {
          button.disabled = false;
          button.textContent = 'Pay to resurrect';
          window.alert(error.message);
        });
    });

    fetch('/death-data')
      .then(response => {
        if (!response.ok) {
          throw new Error('No grave found for this session.');
        }
        return response.json();
      })
      .then(grave => {
        setText('grave-name', formatDeathHeadline(grave));
        setText('grave-job', grave.job || 'Novice');
        setText('grave-level', grave.level ?? 0);
        setText('grave-gold', grave.gold ?? 0);
        setText('grave-room', formatRoom(grave));
        setText('grave-cause', grave.cause || 'Unknown');
        setText('grave-died-at', grave.diedAt || 'Unknown');
        setText('grave-kills', grave.kills ?? 0);
        setText('grave-achievements', grave.achievements && grave.achievements.length > 0 ? grave.achievements.join(', ') : 'None recorded');
      })
      .catch(error => {
        setText('grave-name', error.message);
      });
  </script>
</body>
</html>
