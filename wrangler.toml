name = "rpgchat-worker"
main = "worker/index.mjs"
compatibility_date = "2026-05-28"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "./worker/static"
binding = "ASSETS"
run_worker_first = true
html_handling = "none"
not_found_handling = "none"

[[d1_databases]]
binding = "DB"
database_name = "rpgchat-worker"
database_id = "ad332000-0e5e-473b-bcfb-0e1339bd3df0"
migrations_dir = "migrations"

[[durable_objects.bindings]]
name = "ROOMS"
class_name = "RoomObject"

# Plan 013: Workers AI binding for NPC dialogue. Optional — the generator is
# fallback-first, so the worker runs (with canned NPC lines) even if this account
# has not enabled Workers AI yet.
[ai]
binding = "AI"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["RoomObject"]

[observability]
enabled = true

[triggers]
crons = ["* * * * *"]
