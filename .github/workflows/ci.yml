name: CI

# Makes the QA process automatic instead of a checklist someone has to remember.
# - `test` runs on every push and PR: the full suite + a credential-free bundle
#   check. The suite applies all /migrations to a fresh in-memory DB, so a
#   migration that won't apply fails here.
# - `deploy` runs only on pushes to main, only if a Cloudflare token secret is
#   present. It runs `npm run deploy`, which (via package.json lifecycle hooks)
#   applies remote migrations, deploys, then runs the live smoke test. This is the
#   structural guard against the migration-drift incident: code can no longer reach
#   prod ahead of its schema, and a broken deploy fails the smoke step loudly.

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          # package-lock.json is committed, so installs are reproducible and the
          # npm cache can key off the lockfile hash.
          cache: 'npm'
      - run: npm ci
      - name: Migration filename/order check (non-blocking)
        run: npm run check:migrations
        continue-on-error: true
      - name: Unit + integration tests
        run: npm test
      - name: Worker bundle check (no credentials needed)
        run: npm run check

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      # Skips cleanly until CLOUDFLARE_API_TOKEN is added as a repo secret, so this
      # workflow is safe to merge today and "turns on" auto-deploy the moment you
      # set the secret. Runs migrate → deploy → smoke (the npm `deploy` lifecycle).
      - name: Deploy (migrate → deploy → smoke)
        if: env.CLOUDFLARE_API_TOKEN != ''
        run: npm run deploy
      - name: Deploy skipped (no Cloudflare token secret set)
        if: env.CLOUDFLARE_API_TOKEN == ''
        run: echo "::notice::Set the CLOUDFLARE_API_TOKEN repo secret to enable auto-deploy on push to main."
